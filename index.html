<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seleccionando colores</title>
</head>
<body>

    <script>
        var color;
        color = prompt('Escoge un color: 1, 2, 3, 4, 5, 6', '');

        if (color == "1")
        {
            document.bgColor = '#85F6FF';
        }
        else if (color == "2")
        {
            document.bgColor = '#FFFF1F';
        }
        else if (color == "3")
        {
            document.bgColor = '#DD86F2';
        }
        else if (color == "4")
        {
            document.bgColor = '#FF8617';
        }
        else if (color == "5")
        {
            document.bgColor = '#D02F00';
        }
        else if (color == "6")
        {
            document.bgColor = '#BAB9C9';
        }
        else
        {
            document.write('no está entre las opciones');
        }

    </script>

</body>
</html>
